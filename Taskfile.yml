version: '3'

vars:
  PROJECT: src/asbe/asbe.csproj
  TEST_PROJECT: tests/asbe.Tests/asbe.Tests.csproj
  SB_RG: asbe-testing-rg
  SB_NAMESPACE: asbe-testing
  SB_QUEUE: test-queue
  SB_QUEUE_FAST: test-queue-fast
  SB_LOCATION: uksouth

tasks:
  default:
    cmds:
      - task --list
    silent: true

  build:
    desc: Build the solution
    cmds:
      - dotnet build asbe.slnx

  run:
    desc: Run the asbe app
    cmds:
      - dotnet run --project {{.PROJECT}}

  test:
    desc: Run tests (provide tests/asbe.Tests/appsettings.test.json to also exercise the Azure transport)
    cmds:
      # --no-ansi/--no-progress make the MTP runner emit plain stdout so output isn't lost when piped or captured.
      - dotnet run --project {{.TEST_PROJECT}} -- --no-ansi --no-progress {{.CLI_ARGS}}

  sb:up:
    desc: Create (idempotent) Azure Service Bus namespace + test queues, then print connection string
    cmds:
      - task: sb:ns:up
      - task: sb:queues:up
      - task: sb:print-conn

  sb:ns:up:
    desc: Idempotently create the resource group + Service Bus namespace
    cmds:
      - az group create -n {{.SB_RG}} -l {{.SB_LOCATION}} -o none
      - az servicebus namespace create -g {{.SB_RG}} -n {{.SB_NAMESPACE}} --sku Basic -l {{.SB_LOCATION}} -o none

  sb:queues:up:
    desc: Idempotently create the test queues (matches the asbe appsettings.json config)
    cmds:
      - az servicebus queue create -g {{.SB_RG}} --namespace-name {{.SB_NAMESPACE}} -n {{.SB_QUEUE}} --lock-duration PT30S --max-delivery-count 10 -o none
      - az servicebus queue create -g {{.SB_RG}} --namespace-name {{.SB_NAMESPACE}} -n {{.SB_QUEUE_FAST}} --lock-duration PT5S --max-delivery-count 3 -o none

  sb:queues:reset:
    desc: Delete + recreate the test queues to clear all state (preserves namespace)
    cmds:
      - az servicebus queue delete -g {{.SB_RG}} --namespace-name {{.SB_NAMESPACE}} -n {{.SB_QUEUE}} -o none
      - az servicebus queue delete -g {{.SB_RG}} --namespace-name {{.SB_NAMESPACE}} -n {{.SB_QUEUE_FAST}} -o none
      - task: sb:queues:up

  sb:print-conn:
    desc: Print the namespace connection string
    cmds:
      - |
        echo "Connection string (paste into tests/asbe.Tests/appsettings.test.json to enable Azure tests):"
        az servicebus namespace authorization-rule keys list \
          -g {{.SB_RG}} --namespace-name {{.SB_NAMESPACE}} \
          -n RootManageSharedAccessKey \
          --query primaryConnectionString -o tsv

  sb:down:
    desc: Delete the Azure Service Bus resource group (and everything in it)
    cmds:
      - az group delete -n {{.SB_RG}} -y --no-wait
