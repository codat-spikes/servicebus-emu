version: '3'

vars:
  PROJECT: src/asbe/asbe.csproj
  TEST_PROJECT: tests/asbe.Tests/asbe.Tests.csproj
  SB_RG: asbe-testing-rg
  SB_NAMESPACE: asbe-testing
  SB_QUEUE: test-queue
  SB_QUEUE_FAST: test-queue-fast
  SB_LOCATION: uksouth
  SB_SUBSCRIPTION: Codat Dev

tasks:
  default:
    cmds:
      - task --list
    silent: true

  build:
    desc: Build the solution
    cmds:
      - dotnet build asbe.slnx

  run:
    desc: Run the asbe app
    cmds:
      - dotnet run --project {{.PROJECT}}

  image:build:
    desc: Build a container image (asbe:latest) using the .NET SDK container support
    cmds:
      - dotnet publish {{.PROJECT}} /t:PublishContainer -p:ContainerImageTag=latest --verbosity quiet

  image:run:
    desc: Run the container, exposing 5672 on localhost
    cmds:
      - docker run --rm -it -p 5672:5672 asbe:latest

  sample:
    desc: Run the sample Aspire AppHost (build the asbe image first via `task image:build`)
    cmds:
      - dotnet run --project samples/AppHost/AsbeSample.AppHost.csproj

  test:
    desc: Run all tests (provide tests/asbe.Tests/appsettings.test.json to also exercise the Azure transport)
    cmds:
      # --no-ansi/--no-progress make the MTP runner emit plain stdout so output isn't lost when piped or captured.
      - dotnet run --project {{.TEST_PROJECT}} -- --no-ansi --no-progress {{.CLI_ARGS}}

  test:fast:
    desc: Fast subset (Speed=Fast) — covers ~80% of tests in ~20% of the time; recommended dev loop
    cmds:
      - dotnet run --project {{.TEST_PROJECT}} -- --no-ansi --no-progress --filter-trait "Speed=Fast" {{.CLI_ARGS}}

  test:slow:
    desc: Slow subset (Speed=Slow) — timing-dependent tests excluded from test:fast
    cmds:
      - dotnet run --project {{.TEST_PROJECT}} -- --no-ansi --no-progress --filter-trait "Speed=Slow" {{.CLI_ARGS}}

  test:core:
    desc: Fast core parity tests (send/receive/complete/abandon/peek/explicit-DLQ) — quickest feedback loop
    cmds:
      - dotnet run --project {{.TEST_PROJECT}} -- --no-ansi --no-progress --filter-trait "Category=Core" {{.CLI_ARGS}}

  test:timing:
    desc: Timing-dependent tests (lock expiry/renewal, scheduled delivery, max-delivery DLQ) — slow
    cmds:
      - dotnet run --project {{.TEST_PROJECT}} -- --no-ansi --no-progress --filter-trait "Category=Timing" {{.CLI_ARGS}}

  test:edge:
    desc: Edge-case regression repros (e.g. DeleteQueue deadlock)
    cmds:
      - dotnet run --project {{.TEST_PROJECT}} -- --no-ansi --no-progress --filter-trait "Category=Edge" {{.CLI_ARGS}}

  sb:up:
    desc: Create (idempotent) Azure Service Bus namespace (Basic SKU) + test queues, then print connection string
    cmds:
      - task: sb:ns:up
      - task: sb:queues:up
      - task: sb:print-conn

  sb:up:standard:
    desc: Same as sb:up but Standard SKU — enables topic + session parity tests (~$10/mo base; tear down with sb:down when done)
    cmds:
      - task: sb:ns:up:standard
      - task: sb:queues:up
      - task: sb:print-conn

  sb:ns:up:
    desc: Idempotently create the resource group + Basic-SKU Service Bus namespace
    cmds:
      - az group create --subscription "{{.SB_SUBSCRIPTION}}" -n {{.SB_RG}} -l {{.SB_LOCATION}} -o none
      - az servicebus namespace create --subscription "{{.SB_SUBSCRIPTION}}" -g {{.SB_RG}} -n {{.SB_NAMESPACE}} --sku Basic -l {{.SB_LOCATION}} -o none

  sb:ns:up:standard:
    desc: Idempotently create the resource group + Standard-SKU Service Bus namespace
    cmds:
      - az group create --subscription "{{.SB_SUBSCRIPTION}}" -n {{.SB_RG}} -l {{.SB_LOCATION}} -o none
      - az servicebus namespace create --subscription "{{.SB_SUBSCRIPTION}}" -g {{.SB_RG}} -n {{.SB_NAMESPACE}} --sku Standard -l {{.SB_LOCATION}} -o none

  sb:queues:up:
    desc: Idempotently create the test queues (matches the asbe appsettings.json config)
    cmds:
      - az servicebus queue create --subscription "{{.SB_SUBSCRIPTION}}" -g {{.SB_RG}} --namespace-name {{.SB_NAMESPACE}} -n {{.SB_QUEUE}} --lock-duration PT30S --max-delivery-count 10 -o none
      - az servicebus queue create --subscription "{{.SB_SUBSCRIPTION}}" -g {{.SB_RG}} --namespace-name {{.SB_NAMESPACE}} -n {{.SB_QUEUE_FAST}} --lock-duration PT5S --max-delivery-count 3 -o none

  sb:queues:reset:
    desc: Delete + recreate the test queues to clear all state (preserves namespace)
    cmds:
      - az servicebus queue delete --subscription "{{.SB_SUBSCRIPTION}}" -g {{.SB_RG}} --namespace-name {{.SB_NAMESPACE}} -n {{.SB_QUEUE}} -o none
      - az servicebus queue delete --subscription "{{.SB_SUBSCRIPTION}}" -g {{.SB_RG}} --namespace-name {{.SB_NAMESPACE}} -n {{.SB_QUEUE_FAST}} -o none
      - task: sb:queues:up

  sb:print-conn:
    desc: Print the namespace connection string
    cmds:
      - |
        echo "Connection string (paste into tests/asbe.Tests/appsettings.test.json to enable Azure tests):"
        az servicebus namespace authorization-rule keys list \
          --subscription "{{.SB_SUBSCRIPTION}}" \
          -g {{.SB_RG}} --namespace-name {{.SB_NAMESPACE}} \
          -n RootManageSharedAccessKey \
          --query primaryConnectionString -o tsv

  sb:down:
    desc: Delete the Azure Service Bus resource group (and everything in it)
    cmds:
      - az group delete --subscription "{{.SB_SUBSCRIPTION}}" -n {{.SB_RG}} -y --no-wait
